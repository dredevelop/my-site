<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>No Archives</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #555;
      font-size: 32px;
      margin-bottom: 30px;
    }

    .back-btn {
      background-color: #1e90ff;
      color: white;
      padding: 12px 25px;

      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s, transform 0.2s;
    }

    .back-btn:hover {
      background-color: #0d6efd;
      transform: scale(1.05);
    }
